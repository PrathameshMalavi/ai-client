name: Vercel Production Deployment

# These environment variables are required by the Vercel CLI.
# They are pulled from your GitHub Repository's Secrets.
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code
      - uses: actions/checkout@v4
      
      # Step 2: Install the Vercel Command Line Interface (CLI) globally
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      # Step 3: Pull environment variables and project settings from Vercel
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        
      # Step 4: Build the project using Vercel's build command
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        
      # Step 5: Deploy the prebuilt artifacts to Vercel's production environment
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
